{% extends 'taller/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-12">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Agregar Refacción al Inventario</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ form.nombre.label }}</label>
                        {{ form.nombre }}
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label fw-bold">{{ form.stock.label }}</label>
                            {{ form.stock }}
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-bold">{{ form.precio_neto.label }}</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                {{ form.precio_neto }}
                            </div>
                        </div>
                    </div>
                    <hr class="my-4">
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'taller:inventario' %}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Guardar Repuesto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
