<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taller Rápido Juárez</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <meta name="theme-color" content="#212529">

    <style>
        body { background-color: #f8f9fa; }
        @media (max-width: 991.98px) {
            /* Aumentamos un poco el margen inferior para que el nav más grande no tape el contenido */
            body { padding-bottom: 95px; }
        }
        
        .bottom-nav-link {
            text-decoration: none;
            color: #6c757d;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 10px 0;
            transition: color 0.2s;
        }
        .bottom-nav-link:hover, .bottom-nav-link:focus, .bottom-nav-link:active {
            color: #0d6efd;
        }
        .bottom-nav-text {
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 4px;
        }
        
        /* CONTROL PRECISO DE TAMAÑO DE ÍCONOS (Aprox +25%) */
        .icon-std { 
            font-size: 2.2rem; 
            line-height: 1; 
        }
        .icon-main { 
            font-size: 2.8rem; 
            line-height: 1; 
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 d-none d-lg-flex shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'taller:dashboard' %}">
                <i class="bi bi-tools me-2"></i>Taller Juárez
            </a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link text-uppercase fw-bold" href="{% url 'taller:dashboard' %}">Panel Principal</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-uppercase fw-bold text-info" href="{% url 'taller:nuevo_servicio' %}">Nuevo Servicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-uppercase fw-bold" href="{% url 'taller:inventario' %}">Inventario</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-uppercase fw-bold" href="{% url 'taller:metricas' %}">Métricas</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="bg-dark text-white text-center py-3 mb-4 d-block d-lg-none shadow-sm">
        <h5 class="mb-0 fw-bold"><i class="bi bi-tools me-2"></i>Taller Juárez</h5>
    </div>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <nav class="fixed-bottom bg-white border-top shadow-lg d-block d-lg-none">
        <div class="d-flex justify-content-around align-items-center">
            
            <a href="{% url 'taller:dashboard' %}" class="bottom-nav-link">
                <i class="bi bi-house-door-fill icon-std"></i>
                <span class="bottom-nav-text text-uppercase">Panel</span>
            </a>
            
            <a href="{% url 'taller:nuevo_servicio' %}" class="bottom-nav-link text-primary border-start border-end">
                <i class="bi bi-plus-circle-fill icon-main"></i>
                <span class="bottom-nav-text text-uppercase fw-bold">Nuevo</span>
            </a>
            
            <a href="{% url 'taller:inventario' %}" class="bottom-nav-link">
                <i class="bi bi-box-seam-fill icon-std"></i>
                <span class="bottom-nav-text text-uppercase">Stock</span>
            </a>

            <a href="{% url 'taller:metricas' %}" class="bottom-nav-link border-start">
                <i class="bi bi-graph-up icon-std"></i>
                <span class="bottom-nav-text text-uppercase">Métricas</span>
            </a>

        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    </body>
</html>
